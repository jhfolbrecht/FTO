# --------------------------------------------------------------------------- #
# FTO Program — production docker-compose
# Three services:
#   - app    : Flask + gunicorn (this repo's Dockerfile)
#   - db     : Postgres 16 with named volume
#   - nginx  : Reverse proxy + TLS termination + static file serving
#
# Quick start:
#   cp .env.example .env  &&  edit secrets
#   docker compose up -d --build
# --------------------------------------------------------------------------- #
services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fto}
      POSTGRES_USER: ${POSTGRES_USER:-fto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - fto_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fto} -d ${POSTGRES_DB:-fto}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [fto-net]

  app:
    build: .
    image: fto-program:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-fto}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-fto}
      FLASK_ENV: production
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMeNow!2026}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
    volumes:
      # Mount static so nginx can serve it directly (read-only).
      - ./app/static:/app/app/static:ro
    expose:
      - "8000"
    networks: [fto-net]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/var/www/fto/static:ro
      # Mount your TLS certs here. Easiest: use certbot in standalone mode and
      # bind-mount /etc/letsencrypt into the container (see DEPLOY-SERVER.md).
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks: [fto-net]

volumes:
  fto_pgdata:

networks:
  fto-net:
    driver: bridge
